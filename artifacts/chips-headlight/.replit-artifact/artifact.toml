kind = "web"
previewPath = "/"
title = "Chip's Mobile Headlight Restoration"
version = "1.0.0"
id = "artifacts/chips-headlight"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20917
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/chips-headlight run dev"

[services.env]
PORT = "20917"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/chips-headlight", "run", "build"]
publicDir = "artifacts/chips-headlight/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
